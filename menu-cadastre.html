<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cadastre par Leadia</title>
<style>
  :root{
    --bg:#f5f6fb; --card:#ffffff; --ink:#1f2433; --muted:#8a90a3; --line:#e9ebf4;
    --line2:#e7eaf3; --primary:#6d5cf5; --primary2:#8b5cf6; --soft:#eef0fe;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif}
  a{text-decoration:none;color:inherit}
  /* top bar */
  header{display:flex;align-items:center;gap:14px;padding:14px 26px;background:#fff;border-bottom:1px solid var(--line2)}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#6d5cf5,#8b5cf6);
    position:relative;box-shadow:0 6px 16px rgba(109,92,245,.35)}
  .logo::after{content:"";position:absolute;left:10px;top:11px;width:18px;height:14px;
    border:2.4px solid #fff;border-radius:3px;border-top-color:transparent;transform:rotate(-8deg)}
  .logo::before{content:"";position:absolute;left:13px;top:8px;width:9px;height:9px;border-radius:50%;background:#fff;z-index:1}
  .brand .bt{font-weight:800;font-size:17px;letter-spacing:.2px;color:#2a2f40}
  .brand .bt span{color:var(--primary)}
  .brand .bs{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:1px}
  .spacer{flex:1}
  .search{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line2);
    border-radius:11px;padding:9px 13px;color:var(--muted);font-size:13px;min-width:230px}
  .kbd{margin-left:auto;background:#fff;border:1px solid var(--line2);border-radius:6px;padding:1px 6px;font-size:11px}
  .ghost{background:#fff;border:1px solid var(--line2);color:#4a5066;border-radius:11px;width:40px;height:38px;cursor:pointer;font-size:15px}
  .cta{display:flex;align-items:center;gap:8px;border:none;border-radius:11px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 8px 20px rgba(109,92,245,.32)}
  /* hero */
  .hero{max-width:1080px;margin:24px auto 14px;padding:0 26px}
  .hero h1{margin:0;font-size:24px;font-weight:800;color:#2a2f40}
  .hero p{margin:6px 0 0;color:var(--muted);font-size:13.5px}
  /* quick chips */
  .quick{max-width:1080px;margin:16px auto 8px;padding:0 26px;display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line2);border-radius:999px;
    padding:8px 14px;font-size:12.5px;cursor:pointer;color:#3c4256}
  .pill .d{width:8px;height:8px;border-radius:50%}
  .pill:hover{border-color:#cdd2e6}
  /* grid */
  main{max-width:1080px;margin:8px auto 60px;padding:0 26px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  .tile{position:relative;background:var(--card);border:1px solid var(--line2);border-radius:18px;
    padding:18px 16px;cursor:pointer;color:var(--ink);box-shadow:0 1px 2px rgba(20,30,60,.04);
    transition:transform .14s ease,box-shadow .18s ease,border-color .18s;min-height:138px;
    display:flex;flex-direction:column;gap:12px}
  .tile:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(60,70,120,.13);border-color:#d9def0}
  .chip{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center}
  .chip svg{width:25px;height:25px;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .tile .nm{font-size:14px;font-weight:700;color:#2a2f40}
  .tile .tag{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.2px}
  .tile .badge{position:absolute;top:14px;right:14px;font-size:9px;font-weight:800;letter-spacing:.5px;color:#fff;
    background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:7px;padding:3px 8px}
  .tile .soon{position:absolute;top:14px;right:14px;font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--line2);border-radius:7px;padding:3px 8px;font-weight:600}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:620px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo"></div><div><div class="bt">Cadastre <span>par Leadia</span></div><div class="bs">SUITE OUTILS IMMO</div></div></div>
  <div class="spacer"></div>
  <div class="search">🔍 Rechercher un module… <span class="kbd">Ctrl K</span></div>
  <button class="ghost">☰</button>
  <button class="cta">✦ Demander à Leadia</button>
</header>

<div class="hero">
  <h1>Vos outils immobiliers</h1>
  <p>Prospection, estimation, annonces et données — réunis dans Leadia.</p>
</div>

<div class="quick">
  <div class="pill"><span class="d" style="background:#ef4444"></span>Tutoriels</div>
  <div class="pill"><span class="d" style="background:#ef4444"></span>Tuto Premium</div>
  <div class="pill"><span class="d" style="background:#6d5cf5"></span>Formations</div>
  <div class="pill"><span class="d" style="background:#3b82f6"></span>Groupe Facebook</div>
  <div class="pill"><span class="d" style="background:#9aa0b4"></span>＋ Créer un raccourci</div>
</div>

<main><div class="grid" id="grid"></div></main>

<script>
const I={
 house:'<path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/>',
 gauge:'<path d="M4 19a8 8 0 1 1 16 0"/><path d="M12 19l4.5-5"/><circle cx="12" cy="19" r="1.4"/>',
 bolt:'<path d="M13 2L5 13h5l-1 9 9-12h-6z"/>',
 map:'<path d="M9 4L3 7v13l6-3 6 3 6-3V4l-6 3-6-3z"/><path d="M9 4v13M15 7v13"/>',
 chart:'<path d="M4 20h16"/><rect x="6" y="12" width="3" height="5" rx="1"/><rect x="11" y="8" width="3" height="9" rx="1"/><rect x="16" y="14" width="3" height="3" rx="1"/>',
 pin:'<path d="M12 22s7-6 7-12a7 7 0 1 0-14 0c0 6 7 12 7 12z"/><circle cx="12" cy="10" r="2.4"/>',
 calc:'<rect x="5" y="3" width="14" height="18" rx="3"/><rect x="8" y="6" width="8" height="3" rx="1"/><circle cx="9" cy="13" r=".9"/><circle cx="12" cy="13" r=".9"/><circle cx="15" cy="13" r=".9"/><circle cx="9" cy="17" r=".9"/><circle cx="12" cy="17" r=".9"/><circle cx="15" cy="17" r=".9"/>',
 search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
 heart:'<path d="M12 21s-7-4.6-9.3-9A5 5 0 0 1 12 6.3 5 5 0 0 1 21.3 12c-2.3 4.4-9.3 9-9.3 9z"/>',
 chat:'<path d="M4 5h16v11H9l-4 3v-3H4z"/><path d="M8 10h8M8 13h5"/>',
 mail:'<rect x="3" y="5" width="18" height="14" rx="3"/><path d="M4 7l8 6 8-6"/>',
 spark:'<path d="M12 3l1.8 4.7L18 9.5l-4.2 1.8L12 16l-1.8-4.7L6 9.5l4.2-1.8z"/><path d="M18 15l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/>',
 houseplus:'<path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M12 13v5M9.5 15.5h5"/>',
 share:'<circle cx="6" cy="12" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M8.1 11l7.8-3.8M8.1 13l7.8 3.8"/>',
 docsearch:'<path d="M6 3h7l5 5v6"/><path d="M6 3v18h7"/><circle cx="16" cy="17" r="2.6"/><path d="M20.5 21.5L18 19"/>',
 mic:'<rect x="10" y="3" width="4" height="9" rx="2"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4M9 21h6"/>',
 key:'<circle cx="8" cy="8" r="4"/><path d="M11 11l8 8M16.5 16.5l2-2M18.5 18.5l2-2"/>',
 sofa:'<path d="M5 11V8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3"/><path d="M3 12.5a2 2 0 0 1 4 0V15h10v-2.5a2 2 0 0 1 4 0V18H3z"/><path d="M6 18v2M18 18v2"/>',
 doceuro:'<path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M14.5 12a2.5 2.5 0 1 0 0 4M9.5 13h4"/>'
};
const T=[
 {n:"Annonces Anciens",tag:"Annonces",c:"#d97706",i:"house",link:"./annonces-anciens-module.html"},
 {n:"Immo Stats",tag:"Marché",c:"#6366f1",i:"gauge",link:"./immometre-module.html"},
 {n:"DPE",tag:"Énergie",c:"#a21caf",i:"bolt",badge:"SEMAINE",link:"./prototype-dpe.html"},
 {n:"Cadastre",tag:"Carto",c:"#059669",i:"map",link:"./cadastre-module.html"},
 {n:"DVF",tag:"Données",c:"#2563eb",i:"chart",link:"./dvf-module.html"},
 {n:"Prospection",tag:"CRM",c:"#65a30d",i:"pin",link:"./prospection-module.html"},
 {n:"Calculatrice",tag:"Outils",c:"#64748b",i:"calc",link:"./calculateurs-module.html"},
 {n:"Nouvelle Recherche",tag:"Annonces",c:"#ea580c",i:"search",link:"./nouvelle-recherche-module.html"},
 {n:"Mes Cœurs",tag:"Favoris",c:"#e11d48",i:"heart",soon:1},
 {n:"Chat IA",tag:"IA",c:"#4f46e5",i:"chat",soon:1},
 {n:"Rédaction d'E-mail",tag:"IA",c:"#0891b2",i:"mail",soon:1},
 {n:"Texte Amélioré",tag:"IA",c:"#0d9488",i:"spark",soon:1},
 {n:"Création d'Annonce",tag:"IA",c:"#f97316",i:"houseplus",soon:1},
 {n:"Réseaux Sociaux",tag:"IA",c:"#2563eb",i:"share",soon:1},
 {n:"Analyse de doc.",tag:"IA",c:"#4f46e5",i:"docsearch",soon:1},
 {n:"Transcription audio",tag:"IA",c:"#7c3aed",i:"mic",soon:1},
 {n:"House Staging",tag:"IA",c:"#4338ca",i:"house",soon:1},
 {n:"Mes Estimations",tag:"Outils",c:"#9333ea",i:"doceuro",link:"./estimation-module.html"},
 {n:"Home Staging",tag:"IA",c:"#3b82f6",i:"sofa",soon:1},
 {n:"Annonces Locations",tag:"Annonces",c:"#b45309",i:"key",soon:1}
];
const grid=document.getElementById("grid");
T.forEach(t=>{
  const el=document.createElement(t.link?"a":"div");el.className="tile";if(t.link)el.href=t.link;
  el.innerHTML=(t.badge?'<span class="badge">'+t.badge+'</span>':(t.soon?'<span class="soon">Bientôt</span>':''))
    +'<div class="chip" style="background:'+t.c+'1f"><svg viewBox="0 0 24 24" style="stroke:'+t.c+'">'+I[t.i]+'</svg></div>'
    +'<div class="nm">'+t.n+'</div><div class="tag">'+t.tag+'</div>';
  grid.appendChild(el);
});
</script>
</body>
</html>
